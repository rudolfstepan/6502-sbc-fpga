# Standalone image in boot_shadow_rom physical order:
#   image $0000-$2FFF -> CPU $A000-$CFFF
#   image $3000-$3FFF -> CPU $F000-$FFFF
# This leaves $D000-$EFFF available for I/O, including SID at $D400.
MEMORY {
    ZP:      start = $0000, size = $0100, type = rw;
    ROM:     start = $A000, size = $3000, fill = yes, fillval = $EA, file = %O;
    KERNEL:  start = $F000, size = $0FFA, fill = yes, fillval = $EA, file = %O;
    VECTORS: start = $FFFA, size = $0006, fill = yes, fillval = $EA, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp,  optional = yes;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
