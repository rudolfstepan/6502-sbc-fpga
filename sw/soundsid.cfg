# Linker config for soundtest.rom — a standalone 16 KB ROM image that maps to
# the FPGA shadow ROM window $C000-$FFFF (uploaded with --address 0xC000).
MEMORY {
    ZP:      start = $0000, size = $0100, type = rw;
    ROM:     start = $C000, size = $3FFA, fill = yes, fillval = $EA, file = %O;
    VECTORS: start = $FFFA, size = $0006, fill = yes, fillval = $EA, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp,  optional = yes;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
