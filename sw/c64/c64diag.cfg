# Linker config for the C64 native-core diagnostic ROM.
# Produces a flat 8 KiB image for the KERNAL slot ($E000-$FFFF): code/strings
# in ROM, the 6502 vectors at $FFFA-$FFFF. Zero page holds the few variables.
MEMORY {
    ZP:      start = $0002, size = $00FE, type = rw;
    ROM:     start = $E000, size = $1FFA, fill = yes, fillval = $EA, file = %O;
    VECTORS: start = $FFFA, size = $0006, fill = yes, fillval = $EA, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
