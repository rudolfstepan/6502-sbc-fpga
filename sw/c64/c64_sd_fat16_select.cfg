# Linker config for the FAT16 D64 selector PRG.
# Standard two-byte PRG load address, BASIC SYS stub at $0801, code at $0810.
# Unlike c64_vic_graphics_test.cfg this one carries a BSS segment for the
# runtime FAT16 scan state and the scanned entry tables.
MEMORY {
    LOADADDR: start = $07FF, size = $0002, file = %O;
    ZP:       start = $0002, size = $001E, type = rw;
    MAIN:     start = $0801, size = $57FF, file = %O;
}

SEGMENTS {
    LOADADDR: load = LOADADDR, type = ro;
    ZEROPAGE: load = ZP,       type = zp;
    STARTUP:  load = MAIN,     type = ro;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
    BSS:      load = MAIN,     type = bss, define = yes;
}
