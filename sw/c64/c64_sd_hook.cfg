# Sparse C64 PRG for the combined resident SD hook (fastloader + disk menu).
# The PRG starts at $0801 with a BASIC RUN stub; the resident hook lives at
# $C000 because fastloader plus FAT16 menu no longer fit above $C700.
MEMORY {
    LOADADDR: start = $07FF, size = $0002, file = %O;
    ZP:       start = $0002, size = $001E, type = rw;
    BASIC:    start = $0801, size = $0010, file = %O, fill = yes;
    HIGH:     start = $C000, size = $1000, file = %O;
}

SEGMENTS {
    LOADADDR: load = LOADADDR, type = ro;
    ZEROPAGE: load = ZP,       type = zp;
    STARTUP:  load = BASIC,    type = ro;
    CODE:     load = HIGH,     type = ro;
    RODATA:   load = HIGH,     type = ro;
    BSS:      load = HIGH,     type = bss, define = yes;
}
