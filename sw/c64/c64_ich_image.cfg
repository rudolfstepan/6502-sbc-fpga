# Linker config for the native C64 "ich" image viewer PRG.
# The PRG loads at $0801, starts through a BASIC SYS stub, and carries the
# converted image data above $4000 so runtime copies cannot overwrite source
# bytes while filling the VIC bitmap at $2000.
MEMORY {
    LOADADDR: start = $07FF, size = $0002, file = %O;
    ZP:       start = $0002, size = $001E, type = rw;
    MAIN:     start = $0801, size = $37FF, fill = yes, fillval = $00, file = %O;
    IMGDATA:  start = $4000, size = $2800, file = %O;
}

SEGMENTS {
    LOADADDR: load = LOADADDR, type = ro;
    ZEROPAGE: load = ZP,       type = zp;
    STARTUP:  load = MAIN,     type = ro;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = IMGDATA,  type = ro;
}
