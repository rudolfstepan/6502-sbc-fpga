# Linker config for the native C64 Mandelbrot coprocessor demo.
# The PRG loads at $0801, starts through a BASIC SYS stub at $0810, and keeps
# the payload below $2000 so the VIC bitmap at $2000-$3FFF remains free.
MEMORY {
    LOADADDR: start = $07FF, size = $0002, file = %O;
    ZP:       start = $0002, size = $005E, type = rw;
    MAIN:     start = $0801, size = $17FF, file = %O;
}

SEGMENTS {
    LOADADDR: load = LOADADDR, type = ro;
    ZEROPAGE: load = ZP,       type = zp;
    STARTUP:  load = MAIN,     type = ro;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
}
