# RAM PRG build of the chess game (sw/chess.s), for the D64 GoDrive.
# Relinked from the standalone $C000 ROM down to $2000 (below the VIC bitmap
# window at $6000); started with CALL 8192.  CODE is placed first so the reset
# routine sits at the $2000 entry/load address.  BSS is uninitialised RAM at
# $0200 (well below the loaded image); ZP at $0000.  The board takes over the
# machine and loops in its own game loop (reset/KEY0 to exit), like MANDEL.
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw;
    BSS:  start = $0200, size = $1E00, type = rw;
    MAIN: start = $2000, size = $4000, file = %O, fill = no;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    BSS:      load = BSS,  type = bss, define = yes;
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro;
    # ROM reset vectors are meaningless for a RAM PRG -> discard if present.
    VECTORS:  load = MAIN, type = ro, optional = yes;
}
