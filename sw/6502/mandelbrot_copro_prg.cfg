# RAM PRG build of the Mandelbrot coprocessor demo, for the D64 GoDrive.
# Linked at $2000 (below the VIC bitmap window at $6000); started with CALL 8192.
# It renders to the bitmap, waits for a UART key, returns to text mode, then
# loops forever (reset/KEY0 to exit) — like the SID-player PRGs.
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw;
    MAIN: start = $2000, size = $4000, file = %O, fill = no;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro;
    # The source defines a VECTORS segment (for the ROM build); a RAM PRG has no
    # reset vectors, so discard it.
    VECTORS:  load = MAIN, type = ro, optional = yes;
}
