# SID "page" layout: the tune sits at its native load address in the $A000-$CFFF
# RAM-under-BASIC window (boot_shadow_rom made CPU-writable), and a small player
# lives in the $F000 kernel window. Same boot_shadow_rom physical order as
# soundsid.cfg: image $0000-$2FFF -> $A000-$CFFF, $3000-$3FFF -> $F000-$FFFF.
MEMORY {
    ZP:      start = $0000, size = $0100, type = rw;
    ROM:     start = $A000, size = $3000, fill = yes, fillval = $00, file = %O;
    KERNEL:  start = $F000, size = $0FFA, fill = yes, fillval = $EA, file = %O;
    VECTORS: start = $FFFA, size = $0006, fill = yes, fillval = $EA, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp, optional = yes;
    ROMTUNE:  load = ROM,     type = ro;   # .res pad to load addr + tune bytes
    PLAYER:   load = KERNEL,  type = ro;   # player at $F000
    VECTORS:  load = VECTORS, type = ro;
}
