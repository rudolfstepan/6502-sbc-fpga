# Linker config for the native C64 VIC-II graphics UART-upload test PRG.
# The LOADADDR segment emits the standard two-byte PRG load address, followed by
# a BASIC SYS stub at $0801 and the machine-code payload at $0810.
MEMORY {
    LOADADDR: start = $07FF, size = $0002, file = %O;
    ZP:       start = $0002, size = $001E, type = rw;
    MAIN:     start = $0801, size = $57FF, file = %O;
}

SEGMENTS {
    LOADADDR: load = LOADADDR, type = ro;
    ZEROPAGE: load = ZP,       type = zp;
    STARTUP:  load = MAIN,     type = ro;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
}
