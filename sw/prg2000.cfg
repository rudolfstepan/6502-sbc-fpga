# Generic RAM PRG linked at $2000 (entry = load address; run with CALL 8192).
# Used for plain test/demo PRGs loaded by the D64 GoDrive.
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw;
    MAIN: start = $2000, size = $4000, file = %O, fill = no;
}
SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp, optional = yes;
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro;
    VECTORS:  load = MAIN, type = ro, optional = yes;
}
