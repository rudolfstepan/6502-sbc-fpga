MEMORY {
    ZP:      start = $0000, size = $0100, type = rw;
    # FAT-enumeration scratch tables for the D64 select menu.  Lives in the free
    # SRAM region above EhBASIC's working RAM (Ram_top = $4000), so it never
    # collides with a loaded BASIC program.
    BSSRAM:  start = $7000, size = $1000, type = rw;
    ROM:     start = $F000, size = $0FFA, fill = yes, fillval = $EA, file = %O;
    VECTORS: start = $FFFA, size = $0006, fill = yes, fillval = $EA, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    BSS:      load = BSSRAM,  type = bss;
    JUMPTAB:  load = ROM,     type = ro;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
