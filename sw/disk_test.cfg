# Linker config for disk_test.rom — standalone 16 KB image in boot_shadow_rom
# physical order, for the split ROM map (upload with --split-rom, runs at $A000):
#   image $0000-$2FFF -> CPU $A000-$CFFF   (code/rodata, entry at $A000)
#   image $3000-$3FFF -> CPU $F000-$FFFF   (vectors at $FFFA)
# This leaves $D000-$EFFF free for I/O (the disk drive is at $8824).
MEMORY {
    ZP:      start = $0000, size = $0100, type = rw;
    RAM:     start = $0200, size = $0E00, type = rw;
    ROM:     start = $A000, size = $3000, fill = yes, fillval = $EA, file = %O;
    KERNEL:  start = $F000, size = $0FFA, fill = yes, fillval = $EA, file = %O;
    VECTORS: start = $FFFA, size = $0006, fill = yes, fillval = $EA, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp,  optional = yes;
    BSS:      load = RAM,     type = bss, optional = yes;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
